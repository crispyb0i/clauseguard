<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Contract Analysis — ClauseGuard</title>
<meta name="description" content="AI-powered contract risk analysis by ClauseGuard">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&family=DM+Mono:wght@400&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d1b2a; --navy-mid: #132236; --navy-light: #1c3150;
    --cream: #f5f0e8; --cream-dark: #e8e0d0;
    --gold: #c9a84c; --gold-light: #e8c96a;
    --text-muted: rgba(245,240,232,0.55);
    --border: rgba(201,168,76,0.2); --border-bright: rgba(201,168,76,0.45);
    --red: #f87171; --yellow: #fbbf24; --green: #4ade80;
  }
  body { font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--cream); min-height: 100vh; }

  nav {
    display: flex; align-items: center; justify-content: space-between;
    padding: 1rem 2rem; border-bottom: 1px solid var(--border);
    background: rgba(13,27,42,0.95); backdrop-filter: blur(12px);
  }
  .nav-logo { font-family: 'Playfair Display', serif; font-size: 1.2rem; font-weight: 700; color: var(--cream); text-decoration: none; }
  .nav-logo span { color: var(--gold); }
  .nav-cta { background: var(--gold); color: var(--navy); border: none; padding: 0.5rem 1.25rem; border-radius: 6px; font-size: 0.85rem; font-weight: 600; cursor: pointer; text-decoration: none; font-family: 'DM Sans', sans-serif; }
  .nav-cta:hover { background: var(--gold-light); }

  .container { max-width: 780px; margin: 0 auto; padding: 2rem 1.5rem 4rem; }

  .shared-badge {
    display: inline-flex; align-items: center; gap: 0.4rem;
    font-size: 0.78rem; color: var(--text-muted); margin-bottom: 1.5rem;
    background: var(--navy-mid); border: 1px solid var(--border);
    padding: 0.35rem 0.75rem; border-radius: 20px;
  }

  .results-header {
    display: flex; align-items: flex-start; gap: 1.5rem;
    background: var(--navy-mid); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.5rem; margin-bottom: 1.5rem;
  }
  .risk-score-circle {
    width: 80px; height: 80px; border-radius: 50%; border: 3px solid var(--gold);
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .risk-score-num { font-family: 'Playfair Display', serif; font-size: 1.6rem; font-weight: 700; line-height: 1; }
  .risk-score-label { font-size: 0.65rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.05em; }
  .risk-label-badge { display: inline-block; font-size: 0.78rem; font-weight: 600; padding: 0.2rem 0.65rem; border-radius: 20px; margin-bottom: 0.5rem; }
  .risk-label-badge.low { background: rgba(74,222,128,0.15); color: var(--green); }
  .risk-label-badge.medium { background: rgba(251,191,36,0.15); color: var(--yellow); }
  .risk-label-badge.high { background: rgba(248,113,113,0.15); color: var(--red); }
  .results-filename { font-size: 0.82rem; color: var(--text-muted); font-family: 'DM Mono', monospace; margin-bottom: 0.75rem; }
  .results-summary { font-size: 0.9rem; color: var(--cream); line-height: 1.7; }

  .result-section { margin-bottom: 1.5rem; }
  .result-section-title {
    font-size: 0.78rem; text-transform: uppercase; letter-spacing: 0.08em;
    color: var(--text-muted); margin-bottom: 0.75rem; font-weight: 500;
  }

  .flag-item {
    background: var(--navy-mid); border: 1px solid var(--border);
    border-radius: 8px; padding: 1rem 1.25rem; margin-bottom: 0.75rem;
  }
  .flag-item.high { border-left: 3px solid var(--red); }
  .flag-item.medium { border-left: 3px solid var(--yellow); }
  .flag-header { display: flex; align-items: center; gap: 0.5rem; margin-bottom: 0.4rem; }
  .flag-severity { font-size: 0.72rem; font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em; }
  .flag-severity.high { color: var(--red); }
  .flag-severity.medium { color: var(--yellow); }
  .flag-clause { font-size: 0.88rem; font-weight: 500; }
  .flag-issue { font-size: 0.85rem; color: rgba(245,240,232,0.8); margin-bottom: 0.4rem; line-height: 1.5; }
  .flag-suggestion { font-size: 0.82rem; color: var(--text-muted); line-height: 1.5; }

  .key-terms-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 0.75rem; }
  .key-term {
    background: var(--navy-mid); border: 1px solid var(--border);
    border-radius: 8px; padding: 0.85rem 1rem;
  }
  .key-term-label { font-size: 0.75rem; color: var(--text-muted); margin-bottom: 0.2rem; }
  .key-term-value { font-size: 0.88rem; font-weight: 500; }

  .positive-item {
    display: flex; align-items: flex-start; gap: 0.6rem;
    font-size: 0.88rem; padding: 0.5rem 0; color: rgba(245,240,232,0.85); line-height: 1.5;
  }
  .positive-item::before { content: '✓'; color: var(--green); font-weight: 700; flex-shrink: 0; margin-top: 0.05rem; }

  .no-flags { font-size: 0.88rem; color: var(--green); padding: 0.5rem 0; }

  .cta-banner {
    background: linear-gradient(135deg, var(--navy-light) 0%, var(--navy-mid) 100%);
    border: 1px solid var(--border-bright); border-radius: 12px;
    padding: 2rem; text-align: center; margin-top: 2.5rem;
  }
  .cta-banner h3 { font-family: 'Playfair Display', serif; font-size: 1.4rem; margin-bottom: 0.5rem; }
  .cta-banner p { color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem; line-height: 1.6; }
  .cta-btn { display: inline-block; background: var(--gold); color: var(--navy); padding: 0.75rem 2rem; border-radius: 8px; font-weight: 700; text-decoration: none; font-size: 0.95rem; transition: background 0.2s; }
  .cta-btn:hover { background: var(--gold-light); }
  .cta-sub { margin-top: 0.75rem; font-size: 0.8rem; color: var(--text-muted); }

  .error-state { text-align: center; padding: 6rem 2rem; }
  .error-state h2 { font-family: 'Playfair Display', serif; font-size: 1.6rem; margin-bottom: 0.75rem; }
  .error-state p { color: var(--text-muted); font-size: 0.9rem; }

  @media (max-width: 600px) {
    .results-header { flex-direction: column; gap: 1rem; }
    .key-terms-grid { grid-template-columns: 1fr 1fr; }
  }
</style>
</head>
<body>

<nav>
  <a href="/" class="nav-logo">Clause<span>Guard</span></a>
  <a href="/login" class="nav-cta">Try free →</a>
</nav>

<div class="container" id="app">
  <div class="error-state" id="loadingState">
    <p style="color:var(--text-muted);">Loading analysis…</p>
  </div>
</div>

<script>
  const token = new URLSearchParams(location.search).get('t');

  function esc(s) {
    return String(s ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }

  async function load() {
    const app = document.getElementById('app');

    if (!token) {
      app.innerHTML = `<div class="error-state"><h2>Invalid link</h2><p>This share link is missing a token.</p></div>`;
      return;
    }

    try {
      const res = await fetch(`/api/share?token=${encodeURIComponent(token)}`);
      if (!res.ok) {
        const err = await res.json().catch(() => ({}));
        app.innerHTML = `<div class="error-state"><h2>Analysis not found</h2><p>${err.error || 'This link may have expired or been removed.'}</p></div>`;
        return;
      }

      const data = await res.json();
      const r = data.result;

      const riskClass = r.riskScore >= 60 ? 'high' : r.riskScore >= 35 ? 'medium' : 'low';
      const circleColor = riskClass === 'high' ? 'var(--red)' : riskClass === 'medium' ? 'var(--yellow)' : 'var(--green)';

      const flags = (r.redFlags || []).map(f => `
        <div class="flag-item ${esc(f.severity)}">
          <div class="flag-header">
            <span class="flag-severity ${esc(f.severity)}">${esc(f.severity)}</span>
            <span class="flag-clause">${esc(f.clause)}</span>
          </div>
          <div class="flag-issue">${esc(f.issue)}</div>
          ${f.suggestion ? `<div class="flag-suggestion">💡 ${esc(f.suggestion)}</div>` : ''}
        </div>`).join('');

      const terms = (r.keyTerms || []).map(t => `
        <div class="key-term">
          <div class="key-term-label">${esc(t.label)}</div>
          <div class="key-term-value">${esc(t.value)}</div>
        </div>`).join('');

      const positives = (r.positives || []).map(p => `<div class="positive-item">${esc(p)}</div>`).join('');

      const date = new Date(data.created_at).toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });

      app.innerHTML = `
        <div class="shared-badge">🔗 Shared analysis · ${date}</div>

        <div class="results-header">
          <div class="risk-score-circle" style="border-color:${circleColor}">
            <div class="risk-score-num" style="color:${circleColor}">${r.riskScore}</div>
            <div class="risk-score-label">Risk</div>
          </div>
          <div style="flex:1;min-width:0;">
            <div class="risk-label-badge ${riskClass}">${esc(r.riskLabel)}</div>
            <div class="results-filename">${esc(data.filename)}</div>
            <div class="results-summary">${esc(r.summary)}</div>
          </div>
        </div>

        <div class="result-section" ${!flags ? 'style="display:none"' : ''}>
          <div class="result-section-title">⚠ Red flags</div>
          ${flags || '<div class="no-flags">No significant red flags detected.</div>'}
        </div>

        <div class="result-section">
          <div class="result-section-title">🔑 Key terms</div>
          <div class="key-terms-grid">${terms}</div>
        </div>

        <div class="result-section">
          <div class="result-section-title">✓ What looks good</div>
          ${positives}
        </div>

        <div class="cta-banner">
          <h3>Analyze your own contracts</h3>
          <p>ClauseGuard scans for hidden risks, unfair clauses, and missing protections — in seconds. Free to start, no credit card required.</p>
          <a href="/login" class="cta-btn">Get 3 free analyses →</a>
          <div class="cta-sub">Used by freelancers, consultants &amp; small teams</div>
        </div>
      `;
    } catch (e) {
      document.getElementById('app').innerHTML = `<div class="error-state"><h2>Something went wrong</h2><p>Please try again or check the link.</p></div>`;
    }
  }

  load();
</script>
</body>
</html>
