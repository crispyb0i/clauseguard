<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="icon" type="image/svg+xml" href="/favicon.svg">
<title>Reset Password — ClauseGuard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --navy: #0d1b2a; --navy-mid: #132236; --navy-light: #1c3150;
    --cream: #f5f0e8; --gold: #c9a84c; --gold-light: #e8c96a;
    --text-muted: rgba(245,240,232,0.55);
    --border: rgba(201,168,76,0.2); --border-bright: rgba(201,168,76,0.4);
    --red: #f87171; --green: #4ade80;
  }
  body {
    font-family: 'DM Sans', sans-serif; background: var(--navy); color: var(--cream);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center; padding: 2rem 1rem;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(201,168,76,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(201,168,76,0.03) 1px, transparent 1px);
    background-size: 60px 60px;
  }
  .logo {
    font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700;
    color: var(--cream); letter-spacing: 0.02em; text-decoration: none;
    margin-bottom: 2rem; position: relative;
  }
  .logo span { color: var(--gold); }
  .card {
    width: 100%; max-width: 420px; background: var(--navy-mid);
    border: 1px solid var(--border); border-radius: 10px; padding: 2.5rem; position: relative;
  }
  .form-title {
    font-family: 'Playfair Display', serif; font-size: 1.5rem; font-weight: 700;
    color: var(--cream); margin-bottom: 0.4rem;
  }
  .form-sub { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 1.75rem; }
  .field { margin-bottom: 1.1rem; }
  label {
    display: block; font-size: 0.78rem; font-weight: 500;
    color: var(--text-muted); text-transform: uppercase;
    letter-spacing: 0.07em; margin-bottom: 0.4rem;
  }
  input[type="password"] {
    width: 100%; padding: 0.75rem 1rem;
    background: var(--navy); border: 1px solid var(--border);
    border-radius: 6px; color: var(--cream);
    font-family: 'DM Sans', sans-serif; font-size: 0.9rem;
    outline: none; transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: var(--gold); }
  input::placeholder { color: var(--text-muted); }
  .submit-btn {
    width: 100%; padding: 0.9rem;
    background: var(--gold); color: var(--navy); border: none; border-radius: 6px;
    font-family: 'DM Sans', sans-serif; font-size: 0.95rem; font-weight: 500;
    cursor: pointer; margin-top: 0.5rem; transition: all 0.2s;
    display: flex; align-items: center; justify-content: center; gap: 0.5rem;
  }
  .submit-btn:hover:not(:disabled) { background: var(--gold-light); transform: translateY(-1px); }
  .submit-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
  .spinner-sm {
    width: 16px; height: 16px;
    border: 2px solid rgba(13,27,42,0.3); border-top-color: var(--navy);
    border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
  }
  .submit-btn.loading .spinner-sm { display: block; }
  .submit-btn.loading .btn-label { opacity: 0.7; }
  @keyframes spin { to { transform: rotate(360deg); } }
  .alert {
    display: none; padding: 0.75rem 1rem; border-radius: 6px;
    font-size: 0.85rem; margin-top: 1rem; line-height: 1.5;
  }
  .alert.error { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--red); }
  .alert.success { background: rgba(74,222,128,0.1); border: 1px solid rgba(74,222,128,0.3); color: var(--green); }
  .alert.visible { display: block; }
</style>
</head>
<body>

<a href="/" class="logo">Clause<span>Guard</span></a>

<div class="card">
  <div id="loadingState" style="text-align:center; padding:2rem 0; color:var(--text-muted);">
    Verifying reset link...
  </div>

  <div id="resetForm" style="display:none;">
    <h1 class="form-title">Set new password</h1>
    <p class="form-sub">Choose a strong password for your account.</p>

    <div class="field">
      <label for="newPassword">New Password</label>
      <input type="password" id="newPassword" placeholder="At least 8 characters" autocomplete="new-password">
    </div>
    <div class="field">
      <label for="confirmPassword">Confirm Password</label>
      <input type="password" id="confirmPassword" placeholder="Repeat password" autocomplete="new-password">
    </div>

    <button class="submit-btn" id="resetBtn" onclick="handleReset()">
      <div class="spinner-sm"></div>
      <span class="btn-label">Update Password</span>
    </button>
    <div class="alert" id="resetAlert"></div>
  </div>

  <div id="errorState" style="display:none; text-align:center; padding:1rem 0;">
    <p style="color:var(--red); margin-bottom:1rem;">This reset link is invalid or has expired.</p>
    <a href="/login" style="color:var(--gold); font-size:0.9rem;">Request a new one →</a>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.js"></script>
<script>
  let sb;

  async function init() {
    const cfgRes = await fetch('/api/config');
    const cfg = await cfgRes.json();
    sb = supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

    // Supabase puts the session tokens in the URL hash after redirect
    const { data: { session }, error } = await sb.auth.getSession();

    document.getElementById('loadingState').style.display = 'none';

    if (error || !session) {
      document.getElementById('errorState').style.display = 'block';
      return;
    }

    document.getElementById('resetForm').style.display = 'block';
  }

  async function handleReset() {
    const password = document.getElementById('newPassword').value;
    const confirm = document.getElementById('confirmPassword').value;
    const btn = document.getElementById('resetBtn');
    const alert = document.getElementById('resetAlert');

    clearAlert(alert);

    if (password.length < 8) {
      return showAlert(alert, 'error', 'Password must be at least 8 characters.');
    }
    if (password !== confirm) {
      return showAlert(alert, 'error', 'Passwords do not match.');
    }

    btn.classList.add('loading');
    btn.disabled = true;

    const { error } = await sb.auth.updateUser({ password });

    btn.classList.remove('loading');
    btn.disabled = false;

    if (error) {
      showAlert(alert, 'error', error.message);
    } else {
      showAlert(alert, 'success', 'Password updated! Redirecting to app...');
      setTimeout(() => window.location.replace('/app'), 1500);
    }
  }

  function showAlert(el, type, msg) {
    el.className = `alert ${type} visible`;
    el.textContent = msg;
  }

  function clearAlert(el) {
    el.className = 'alert';
    el.textContent = '';
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Enter') handleReset();
  });

  init();
</script>
</body>
</html>
